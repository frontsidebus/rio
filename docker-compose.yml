# MERLIN - AI Co-Pilot for MSFS 2024
# Docker Compose configuration for local services.
#
# NOTE: The SimConnect bridge (C#) runs natively on the Windows host
# because it requires direct access to the SimConnect SDK.
# The orchestrator connects to it via WebSocket on localhost:8080.
#
# Usage:
#   docker compose up -d              # start all services
#   docker compose up -d chromadb     # start only ChromaDB
#   docker compose logs -f whisper    # follow whisper logs

services:
  # ---------------------------------------------------------------------------
  # Whisper - Local speech-to-text via faster-whisper HTTP API
  # Provides an OpenAI-compatible /v1/audio/transcriptions endpoint.
  # ---------------------------------------------------------------------------
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: merlin-whisper
    ports:
      - "9090:8000"
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-medium}
      - WHISPER__INFERENCE_DEVICE=cpu
    volumes:
      - whisper_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - merlin
    # -------------------------------------------------------------------------
    # GPU acceleration (NVIDIA). Uncomment the lines below and comment out
    # the CPU image above if you have an NVIDIA GPU and nvidia-container-toolkit.
    # See: https://docs.docker.com/compose/gpu-support/
    # -------------------------------------------------------------------------
    # Uncomment for GPU acceleration (requires nvidia-container-toolkit):
    # image: fedirz/faster-whisper-server:latest-cuda
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # ChromaDB - Vector store for RAG (Retrieval-Augmented Generation)
  # Stores aircraft manuals, checklists, and procedures for context retrieval.
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: merlin-chromadb
    ports:
      - "8000:8000"
    environment:
      - ANONYMIZED_TELEMETRY=false
      - IS_PERSISTENT=TRUE
    volumes:
      - ./data/chroma_db:/chroma/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - merlin

  # ---------------------------------------------------------------------------
  # Orchestrator - MERLIN's brain
  # Coordinates between Claude, SimConnect bridge, Whisper, and ChromaDB.
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: merlin-orchestrator
    ports:
      - "3838:3838"
    depends_on:
      whisper:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - WHISPER_URL=http://whisper:8000
      - CHROMADB_URL=http://chromadb:8000
      # The SimConnect bridge runs on the Windows host. In Docker Desktop for
      # Windows, host.docker.internal resolves to the host machine.
      - SIMCONNECT_BRIDGE_URL=ws://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - merlin

volumes:
  whisper_cache:
    driver: local

networks:
  merlin:
    name: merlin
    driver: bridge
